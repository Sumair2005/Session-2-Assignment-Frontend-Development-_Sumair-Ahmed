<!DOCTYPE html>
<html lang="en">
<head>
    <title>NayaQadam - Register</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        
        body {
            color: #333333;
            line-height: 1.6;
            background-color: white;
        }

        /* --- Navbar Styles --- */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #1a252f;
            padding: 15px;
        }

        .navbar .logo {
            color: #ffffff;
            font-size: 24px;
            font-weight: bold;
            text-decoration: none;
        }

        .nav-links {
            list-style: none;
            display: flex;
        }

        .nav-links li {
            margin-left: 20px;
        }

        .nav-links a {
            color: #ffffff;
            text-decoration: none;
            font-size: 16px;
        }

        /* --- Registration Section --- */
        .register-section {
            padding: 40px 20px;
            text-align: center;
        }

        h2 {
            font-size: 28px;
            margin-bottom: 15px;
            color: #2c3e50;
        }

        p {
            margin-bottom: 25px;
            font-size: 16px;
        }

        /* --- Form Styles --- */
        .register-form {
            max-width: 400px;
            margin: 0 auto;
            text-align: left;
            border: 1px solid #ccc;
            padding: 30px;
            border-radius: 5px;
            background-color: white;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
        }

        /* --- Error Message Styles --- */
        .error-message {
            color: red;
            font-size: 13px;
            margin-top: 5px;
            display: block;
        }

        .submit-btn {
            background-color: #2c3e50;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
            font-weight: bold;
            margin-top: 10px;
        }

        /* --- Footer --- */
        footer {
            background-color: #1a252f;
            color: #ffffff;
            text-align: center;
            padding: 15px;
            font-size: 14px;
            margin-top: 40px;
        }

        /* --- Mobile Responsive --- */
        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                gap: 15px;
            }

            .nav-links {
                width: 100%;
                justify-content: center;
            }

            .register-form {
                width: 100%;
                padding: 20px;
            }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="#" class="logo">NayaQadam</a>
        <ul class="nav-links">
            <li><a href="#">Home</a></li>
            <li><a href="#">About Us</a></li>
            <li><a href="#">Services</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>

    <section class="register-section">
        <h2>Create an Account</h2>
        <p>Please fill out this form to register with us.</p>
        
        <form class="register-form" id="regForm" onsubmit="return validateForm(event)">
            
            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" placeholder="Enter your full name">
                <span class="error-message" id="nameError"></span>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="text" id="email" placeholder="Enter your email address">
                <span class="error-message" id="emailError"></span>
            </div>

            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="text" id="phone" placeholder="Enter your phone number">
                <span class="error-message" id="phoneError"></span>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Create a password">
                <span class="error-message" id="passError"></span>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" placeholder="Confirm your password">
                <span class="error-message" id="confirmError"></span>
            </div>

            <button type="submit" class="submit-btn">Register</button>
        </form>
    </section>

    <footer>
        <p>&copy; 2026 NayaQadam. All rights reserved.</p>
    </footer>

    <script>
        function validateForm(event) {
            // Prevent the default form submission page refresh
            event.preventDefault();

            // Get form values
            var name = document.getElementById("name").value.trim();
            var email = document.getElementById("email").value.trim();
            var phone = document.getElementById("phone").value.trim();
            var password = document.getElementById("password").value;
            var confirmPassword = document.getElementById("confirmPassword").value;

            // Clear previous error messages
            document.getElementById("nameError").innerHTML = "";
            document.getElementById("emailError").innerHTML = "";
            document.getElementById("phoneError").innerHTML = "";
            document.getElementById("passError").innerHTML = "";
            document.getElementById("confirmError").innerHTML = "";

            var isValid = true;

            // Name validation
            if (name === "") {
                document.getElementById("nameError").innerHTML = "Name is required.";
                isValid = false;
            }

            // Email validation (Basic checks for @ and .)
            if (email === "") {
                document.getElementById("emailError").innerHTML = "Email is required.";
                isValid = false;
            } else if (email.indexOf("@") === -1 || email.indexOf(".") === -1) {
                document.getElementById("emailError").innerHTML = "Please enter a valid email address.";
                isValid = false;
            }

            // Phone validation
            if (phone === "") {
                document.getElementById("phoneError").innerHTML = "Phone number is required.";
                isValid = false;
            } else if (isNaN(phone)) {
                document.getElementById("phoneError").innerHTML = "Phone number must contain numbers only.";
                isValid = false;
            } else if (!phone.startsWith("03")) {
                document.getElementById("phoneError").innerHTML = "Phone number must start with 03.";
                isValid = false;
            } else if (phone.length !== 11) {
                document.getElementById("phoneError").innerHTML = "Phone number must be exactly 11 digits long.";
                isValid = false;
            }

            // Password validation
            if (password === "") {
                document.getElementById("passError").innerHTML = "Password is required.";
                isValid = false;
            } else if (password.length < 6) {
                document.getElementById("passError").innerHTML = "Password must be at least 6 characters long.";
                isValid = false;
            }

            // Confirm Password validation
            if (confirmPassword === "") {
                document.getElementById("confirmError").innerHTML = "Please confirm your password.";
                isValid = false;
            } else if (password !== confirmPassword) {
                document.getElementById("confirmError").innerHTML = "Passwords do not match.";
                isValid = false;
            }

            // If all fields are valid, show success message
            if (isValid) {
                alert("Registration successful!");
                document.getElementById("regForm").reset();
            }

            return isValid;
        }
    </script>

</body>
</html>
